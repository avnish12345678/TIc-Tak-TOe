# Deploy the Vite frontend to GitHub Pages.
# Nakama + Postgres still run on a VPS / cloud VM (or Heroic Cloud); set repo secrets below.
#
# If you see "There isn't a GitHub Pages site here":
# 1) Repo → Settings → Pages → Source = "GitHub Actions"
# 2) Add all four VITE_* secrets (Actions tab will fail the build until they exist)
# 3) Open: https://<owner>.github.io/<exact-repo-name>/  (copy repo name from the repo title bar)

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Check Nakama secrets
        run: |
          missing=
          [ -z "${{ secrets.VITE_NAKAMA_HOST }}" ] && missing="$missing VITE_NAKAMA_HOST"
          [ -z "${{ secrets.VITE_NAKAMA_PORT }}" ] && missing="$missing VITE_NAKAMA_PORT"
          [ -z "${{ secrets.VITE_NAKAMA_SERVER_KEY }}" ] && missing="$missing VITE_NAKAMA_SERVER_KEY"
          [ -z "${{ secrets.VITE_NAKAMA_USE_SSL }}" ] && missing="$missing VITE_NAKAMA_USE_SSL"
          if [ -n "$missing" ]; then
            echo "::error::Add these repository secrets (Settings → Secrets and variables → Actions):$missing"
            exit 1
          fi

      - name: Expected site URL
        run: |
          echo "Project Pages URL (after a green deploy): https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

      - name: Install and build
        env:
          VITE_NAKAMA_HOST: ${{ secrets.VITE_NAKAMA_HOST }}
          VITE_NAKAMA_PORT: ${{ secrets.VITE_NAKAMA_PORT }}
          VITE_NAKAMA_SERVER_KEY: ${{ secrets.VITE_NAKAMA_SERVER_KEY }}
          VITE_NAKAMA_USE_SSL: ${{ secrets.VITE_NAKAMA_USE_SSL }}
          VITE_NAKAMA_USE_VITE_PROXY: "false"
        run: |
          cd frontend
          npm ci
          npm run build -- --base=/${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
